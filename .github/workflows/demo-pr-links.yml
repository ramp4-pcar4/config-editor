name: PR demo links

on:
    pull_request_target:
        types: [opened]

permissions:
    issues: write
    pull-requests: write

jobs:
    comment-on-pr:
        name: Comment demo links on PR
        runs-on: ubuntu-latest
        steps:
            - name: Comment on the PR
              uses: actions/github-script@v8
              env:
                  PR_OWNER: ${{ github.event.pull_request.head.repo.owner.login }}
                  PR_HEAD_REF: ${{ github.head_ref }}
              with:
                  script: |
                      const { PR_OWNER, PR_HEAD_REF } = process.env;
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `Your demo site is ready.

                      Demo: https://${PR_OWNER}.github.io/config-editor/${PR_HEAD_REF}/index-ca-en.html`
                      })
