<!DOCTYPE html>
<html lang="fr" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta content="width=device-width,initial-scale=1" name="viewport" />

        <title>Éditeur de configuration PCAR4</title>

        <!-- Load stylesheet -->
        <link rel="stylesheet" href="https://www.canada.ca/etc/designs/canada/cdts/gcweb/v5_0_2/cdts/cdts-styles.css" />

        <!-- Load/activate closure template scripts -->
        <script
            src="https://www.canada.ca/etc/designs/canada/cdts/gcweb/v5_0_2/cdts/compiled/wet-fr.js"
            data-cdts-setup='{"cdnEnv": "prod"}'
        ></script>
      <script type="module" crossorigin src="./assets/main-CZkCaZa_.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/main-JuVCVNdQ.css">
    </head>
    <body>
        <!-- template top and no-script fallback -->
        <div id="def-top"></div>

        <div id="wb-cont">
            <div id="app" class="container"></div>
        </div>

        <!-- template footer and no-script fallback -->
        <div id="def-footer"></div>

        <script type="text/javascript">

            var defTop = document.getElementById('def-top');
            defTop.outerHTML = wet.builder.top({
                lngLinks: [
                    {
                        lang: 'en',
                        href: window.location.href.replace('ca-fr.html', 'ca-en.html'),
                        text: 'English'
                    }
                ]
            });

            document.querySelectorAll('.wb-sl').forEach(function (skipLink) {
                skipLink.setAttribute('href', window.location.href.split(/#[^\/]/)[0] + '#' + skipLink.href.split('#')[1]);
            });
            var interval = setInterval(function () {
                var links = document.querySelectorAll('.wb-sl');
                if (links.length === 3) {
                    clearInterval(interval);
                    links[2].setAttribute('href', window.location.href.split(/#[^\/]/)[0] + '?' + links[2].href.split('?')[1]);
                }
            }, 200);
        </script>

        <script>
            var defFooter = document.getElementById('def-footer');
            defFooter.outerHTML = wet.builder.footer({});
        </script>


        <style>
            body {
                margin: 0;
            }
            #wb-cont {
                display: flex;
                flex-direction: column;
                padding: 8px;
                height: calc(100vh - 64px);
                gap: 16px;
            }
            #app {
                height:100%;
            }
        </style>
    </body>
</html>
